<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Happy Birthday</title>
    <style>
        /* 1. 强制锁死 html 和 body，禁止任何滚动 */
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* 核心：隐藏溢出内容 */
            position: fixed;
            /* 核心：固定页面，防止手机端回弹/橡皮筋效果 */
            top: 0;
            left: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f0e6fa 0%, #d8bfd8 100%);
        }

        /* 2. 粒子容器改为 fixed 定位，确保它永远只在屏幕窗口内 */
        #particles {
            position: fixed;
            /* 改为 fixed */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
            bottom: -50px;
            animation: float-up linear infinite;
        }

        @keyframes float-up {
            0% {
                transform: translateY(0) translateX(0) scale(0.8);
                opacity: 0;
            }

            20% {
                opacity: 0.8;
            }

            80% {
                opacity: 0.5;
            }

            100% {
                /* 减少横向移动距离，防止视觉上的混乱 */
                transform: translateY(-120vh) translateX(30px) scale(1.2);
                opacity: 0;
            }
        }

        .birthday-message {
            position: relative;
            z-index: 10;
            font-size: 5vw;
            /* 电脑端默认 */
            font-weight: bold;
            color: #8b008b;
            text-shadow:
                2px 2px 4px rgba(0, 0, 0, 0.2),
                0 0 10px rgba(139, 0, 139, 0.5);
            letter-spacing: 0.05em;
            text-align: center;
            padding: 20px 40px;
            border-radius: 15px;
            background-color: rgba(255, 255, 255, 0.7);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            animation: breathe 3s ease-in-out infinite alternate;

            /* 防止文字换行导致布局丑陋 */
            white-space: nowrap;
        }

        @keyframes breathe {
            0% {
                transform: scale(1);
                box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            }

            100% {
                transform: scale(1.03);
                box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
            }
        }

        /* 移动端特定优化 */
        @media (max-width: 768px) {
            .birthday-message {
                font-size: 8vw;
                /* 调大手机端字体 */
                padding: 15px 30px;
                white-space: normal;
                /* 手机屏幕窄，允许换行 */
            }
        }
    </style>
</head>

<body>

    <div id="particles"></div>

    <div class="birthday-message">
        🎈祝陈楠生日快乐！</div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('particles');
            // 稍微减少粒子数量，提升手机性能
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');

                const size = Math.random() * 15 + 5;
                const left = Math.random() * 100;
                const duration = Math.random() * 10 + 10;
                const delay = Math.random() * 15;

                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${left}%`;
                particle.style.animationDuration = `${duration}s`;
                particle.style.animationDelay = `-${delay}s`;

                container.appendChild(particle);
            }
        });
    </script>
</body>

</html>
